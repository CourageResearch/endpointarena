name: Uptime Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check production health endpoint
        id: health
        env:
          HEALTHCHECK_URL: https://endpointarena.com/api/health
        run: |
          set -euo pipefail

          status_code="$(curl -sS --retry 2 --retry-connrefused --max-time 10 -o /tmp/health.json -w "%{http_code}" "$HEALTHCHECK_URL")"
          echo "status_code=$status_code" >> "$GITHUB_OUTPUT"
          echo "HTTP $status_code"
          cat /tmp/health.json

          if [ "$status_code" -ne 200 ]; then
            echo "Health endpoint returned non-200 status"
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs')
          const raw = fs.readFileSync('/tmp/health.json', 'utf8')

          let payload
          try {
            payload = JSON.parse(raw)
          } catch (error) {
            console.error('Health endpoint returned invalid JSON')
            process.exit(1)
          }

          if (!payload || payload.ok !== true) {
            console.error('Health endpoint JSON did not contain ok=true')
            process.exit(1)
          }
          NODE

      - name: Send webhook alert (optional)
        if: failure()
        env:
          UPTIME_ALERT_WEBHOOK_URL: ${{ secrets.UPTIME_ALERT_WEBHOOK_URL }}
          STATUS_CODE: ${{ steps.health.outputs.status_code }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${UPTIME_ALERT_WEBHOOK_URL:-}" ]; then
            echo "UPTIME_ALERT_WEBHOOK_URL is not configured; skipping webhook alert."
            exit 0
          fi

          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          payload="$(cat <<JSON
          {"text":"Endpoint Arena healthcheck failed at ${timestamp}. URL: https://endpointarena.com/api/health status=${STATUS_CODE:-unknown}. Run: https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"}
          JSON
          )"

          curl -sS -X POST \
            -H "Content-Type: application/json" \
            --data "$payload" \
            "$UPTIME_ALERT_WEBHOOK_URL"

      - name: Send Resend email alert (optional)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          UPTIME_ALERT_EMAIL_TO: ${{ secrets.UPTIME_ALERT_EMAIL_TO }}
          UPTIME_ALERT_EMAIL_FROM: ${{ secrets.UPTIME_ALERT_EMAIL_FROM }}
          STATUS_CODE: ${{ steps.health.outputs.status_code }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${UPTIME_ALERT_EMAIL_TO:-}" ]; then
            echo "RESEND_API_KEY or UPTIME_ALERT_EMAIL_TO is not configured; skipping email alert."
            exit 0
          fi

          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export timestamp

          node <<'NODE' > /tmp/resend-email.json
          const to = (process.env.UPTIME_ALERT_EMAIL_TO || '')
            .split(',')
            .map((value) => value.trim())
            .filter(Boolean)

          const payload = {
            from: process.env.UPTIME_ALERT_EMAIL_FROM || 'Endpoint Arena <noreply@endpointarena.com>',
            to,
            subject: '[ALERT] Endpoint Arena healthcheck failed',
            text: `Endpoint Arena healthcheck failed at ${process.env.timestamp}. URL: https://endpointarena.com/api/health status=${process.env.STATUS_CODE || 'unknown'}. Run: https://github.com/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`,
          }

          process.stdout.write(JSON.stringify(payload))
          NODE

          curl -fsS https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/resend-email.json
